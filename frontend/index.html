<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Unicons for Icons -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark-theme">
    
    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- Login View -->
        <div id="login-view" class="view glass-panel active">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your video distribution portal</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <i class="uil uil-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="uil uil-lock-alt"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-login">
                    <span>Sign In</span>
                    <i class="uil uil-arrow-right"></i>
                </button>
            </form>
            <div id="login-error" class="error-msg hidden">Invalid credentials</div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view hidden">
            <!-- Navbar -->
            <nav class="navbar glass-nav">
                <div class="nav-brand">
                    <i class="uil uil-play-circle brand-icon"></i>
                    <span>Video Portal</span>
                </div>
                <div class="nav-actions">
                    <span id="user-email">user@example.com</span>
                    <button id="btn-logout" class="btn btn-outline">
                        <i class="uil uil-sign-out-alt"></i> Logout
                    </button>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Projects Sidebar -->
                <aside class="sidebar glass-panel">
                    <h3>Your Projects</h3>
                    <ul id="projects-list" class="styled-list">
                        <!-- Populated by JS -->
                    </ul>
                </aside>

                <!-- Video List Area -->
                <section class="content-area glass-panel">
                    <div class="content-header">
                        <h2 id="current-project-name">Select a Project</h2>
                    </div>
                    <div class="video-grid" id="videos-grid">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </main>
        </div>

        <!-- Background Animation Elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

    </div>

    <!-- Notifications Hub -->
    <div id="notification-hub" class="notification-hub"></div>

    <script src="/static/app.js"></script>
</body>
</html>
